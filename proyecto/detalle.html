<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalServ – Detalle</title>

  <link rel="stylesheet" href="css/estilos.css" />

  <style>
    /*  BREADCRUMB  */
    .breadcrumb {
      padding: 14px 40px;
      font-size: 0.88rem;
      color: var(--color-gris3);
      background-color: var(--color-blanco);
      border-bottom: 1px solid var(--color-gris1);
    }

    .breadcrumb a {
      color: var(--color-primario);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    /* Panel principal de detalles  */
    .detalle {
      display: grid;
      /* Dos columnas una imagen a la izquierda e info a la derecha */
      grid-template-columns: 480px 1fr;
      gap: 48px;
      padding: 48px 40px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Imagen grande del servicio */
    .detalle__imagen {
      border-radius: 18px;
      height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      position: relative; /* Para posicionar el badge */
    }

    /* Badge de categoría sobre la imagen */
    .detalle__badge {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background-color: var(--color-primario);
      color: var(--color-blanco);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* Columna de información */
    .detalle__info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .detalle__nombre {
      font-size: 2rem;
      font-weight: 800;
    }

    .detalle__desc-corta {
      color: var(--color-gris3);
      font-size: 1rem;
      line-height: 1.6;
    }

    /* Fila de valoración */
    .detalle__valoracion {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detalle__estrellas {
      color: #FFB347;
      font-size: 1.3rem;
    }

    .detalle__puntaje {
      font-weight: 700;
      font-size: 1rem;
    }

    .detalle__resenas {
      color: var(--color-gris3);
      font-size: 0.88rem;
    }

    /* Grid de fichas de información */
    .detalle__fichas {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .ficha {
      background-color: var(--color-fondo);
      border: 1px solid var(--color-gris1);
      border-radius: 10px;
      padding: 14px 18px;
    }

    .ficha__etiqueta {
      font-size: 0.82rem;
      color: var(--color-gris3);
      margin-bottom: 4px;
    }

    .ficha__valor {
      font-size: 1rem;
      font-weight: 700;
    }

    /* Descripción larga */
    .detalle__descripcion-larga {
      font-size: 0.95rem;
      color: var(--color-gris3);
      line-height: 1.7;
    }

    /* Fila de botones de acción */
    .detalle__botones {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* SERVICIOS RELACIONADOS  */
    .relacionados {
      background-color: var(--color-blanco);
      padding: 48px 40px;
      border-top: 1px solid var(--color-gris1);
    }

    .relacionados__grid {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 28px;
    }
  </style>
</head>

<body>

  <!--  NAVBAR  -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">Digital<span>Serv</span></a>
    <ul class="navbar__menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="favoritos.html">Favoritos</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <!-- BREADCRUMB  -->
  <div class="breadcrumb">
    <a href="index.html">Inicio</a> &rsaquo;
    <a href="servicios.html">Servicios</a> &rsaquo;
    <!-- JavaScript pondrá aquí el nombre del servicio -->
    <span id="breadcrumb-nombre">Cargando...</span>
  </div>

  <!--  PANEL PRINCIPAL -->
  <main>
    <div class="detalle" id="panel-detalle">
      <!-- JavaScript inserta el contenido aquí -->
    </div>

    <!-- SERVICIOS RELACIONADOS -->
    <section class="relacionados">
      <div style="max-width:1280px; margin:0 auto;">
        <h2 class="seccion-titulo">Servicios Relacionados</h2>
        <div class="relacionados__grid" id="contenedor-relacionados"></div>
      </div>
    </section>
  </main>

  <!-- FOOTER  -->
  <footer>
    <p>&copy; 2024 DigitalServ &nbsp;|&nbsp; Todos los derechos reservados</p>
  </footer>

  <script src="js/datos.js"></script>
  <script src="js/detalle.js"></script>

</body>
</html>
