<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalServ – Mis Favoritos</title>

  <link rel="stylesheet" href="css/estilos.css" />

  <style>
    /* Cabecera con contador y botón */
    .cabecera-favoritos {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    /* Tarjeta horizontal de favoritos */
    .fav-card {
      background-color: var(--color-blanco);
      border: 1px solid var(--color-gris1);
      border-radius: 16px;
      padding: 20px;
      display: flex;           /* Elementos en fila horizontal */
      align-items: center;
      gap: 24px;
      box-shadow: var(--sombra);
      transition: transform 0.2s;
    }

    .fav-card:hover {
      transform: translateY(-3px);
    }

    /* Imagen/ícono del servicio */
    .fav-card__imagen {
      width: 100px;
      height: 90px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0; /* No se encoge con el contenido */
    }

    /* Información del servicio */
    .fav-card__info {
      flex: 1; /* Ocupa el espacio sobrante */
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fav-card__categoria {
      display: inline-block;
      background-color: var(--color-primario);
      color: var(--color-blanco);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      align-self: flex-start;
    }

    .fav-card__nombre {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .fav-card__desc {
      font-size: 0.9rem;
      color: var(--color-gris3);
    }

    .fav-card__estrellas {
      color: #FFB347;
      font-size: 0.95rem;
    }

    /* Sección de precio */
    .fav-card__precio {
      text-align: right;
      flex-shrink: 0;
    }

    .fav-card__precio-valor {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--color-primario);
    }

    .fav-card__precio-nota {
      font-size: 0.8rem;
      color: var(--color-gris3);
    }

    /* Botones de acción de la card */
    .fav-card__acciones {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    /* Lista de favoritos con espacio entre cada card */
    #lista-favoritos {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
  </style>
</head>

<body>

  <!--  NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">Digital<span>Serv</span></a>
    <ul class="navbar__menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="favoritos.html" class="activo">Favoritos</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <!-- ENCABEZADO  -->
  <div class="encabezado-pagina">
    <h1>Mis Favoritos</h1>
    <p id="contador-favoritos">Cargando...</p>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <section class="seccion">

      <!-- Botón para limpiar todo de favoritos -->
      <div style="text-align:right; margin-bottom:24px;">
        <button
          id="btn-limpiar"
          class="btn btn--acento"
          style="display:none;"
          onclick="limpiarTodos()"
        >
          Limpiar todo
        </button>
      </div>

      <!-- Lista de favoritos JavaScript inserta las cards -->
      <div id="lista-favoritos"></div>

      <!-- Estado vacío -->
      <div class="estado-vacio" id="estado-vacio" style="display:none;">
        <p> No tienes servicios guardados todavía.</p>
        <p style="margin-bottom:20px; font-size:0.9rem;">
          Usa el botón en las páginas de detalle para guardar tus favoritos.
        </p>
        <a href="servicios.html" class="btn btn--primario">
          → Explorar Catálogo
        </a>
      </div>

    </section>
  </main>

  <!--  FOOTER  -->
  <footer>
    <p>&copy; 2024 DigitalServ &nbsp;|&nbsp; Todos los derechos reservados</p>
  </footer>

  <script src="js/datos.js"></script>
  <script src="js/favoritos.js"></script>

</body>
</html>
