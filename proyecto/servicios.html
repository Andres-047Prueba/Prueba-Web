<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalServ – Catálogo de Servicios</title>

  <link rel="stylesheet" href="css/estilos.css" />

  <style>
    /*  BARRA DE FILTROS */
    .barra-filtros {
      background-color: var(--color-blanco);
      padding: 18px 40px;
      border-bottom: 1px solid var(--color-gris1);
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap; /* Los elementos saltan de línea en pantallas pequeñas */
    }

    /* Campo de búsqueda */
    .barra-filtros__busqueda {
      padding: 10px 16px;
      border: 1px solid var(--color-gris2);
      border-radius: 8px;
      font-size: 0.95rem;
      width: 280px;
      outline: none;             /* Quita el borde azul por defecto */
      font-family: var(--fuente);
    }

    .barra-filtros__busqueda:focus {
      border-color: var(--color-primario); /* Borde azul cuando está activo */
    }

    /* Contenedor de los chips de categoría */
    .barra-filtros__chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Cada botón de categoría (chip) */
    .chip {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--color-gris2);
      background-color: var(--color-blanco);
      color: var(--color-gris3);
      cursor: pointer;
      font-size: 0.88rem;
      font-family: var(--fuente);
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--color-primario);
      color: var(--color-primario);
    }

    /* Chip seleccionado */
    .chip.activo {
      background-color: var(--color-primario);
      border-color: var(--color-primario);
      color: var(--color-blanco);
      font-weight: 600;
    }

    /* Paginacón */
    .paginacion {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 48px;
    }

    .paginacion__btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--color-gris2);
      background-color: var(--color-blanco);
      color: var(--color-gris3);
      cursor: pointer;
      font-size: 0.95rem;
      font-family: var(--fuente);
      transition: all 0.2s;
    }

    .paginacion__btn:hover {
      border-color: var(--color-primario);
      color: var(--color-primario);
    }

    .paginacion__btn.activo {
      background-color: var(--color-primario);
      border-color: var(--color-primario);
      color: var(--color-blanco);
      font-weight: 700;
    }
  </style>
</head>

<body>

  <!-- NAVBAR  -->
  <nav class="navbar">
    <a href="index.html" class="navbar__logo">Digital<span>Serv</span></a>
    <ul class="navbar__menu">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html" class="activo">Servicios</a></li>
      <li><a href="favoritos.html">Favoritos</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <!--  ENCABEZADO  -->
  <div class="encabezado-pagina">
    <h1>Catálogo de Servicios</h1>
    <p>Explora todos nuestros servicios disponibles</p>
  </div>

  <!--  BARRA DE FILTROS Y BÚSQUEDA-->
  <div class="barra-filtros">

    <!-- Campo de búsqueda en tiempo real -->
    <input
      type="text"
      id="busqueda"
      class="barra-filtros__busqueda"
      placeholder=" Buscar servicio..."
    />

    <!-- Chips de filtro por categoría -->
    <div class="barra-filtros__chips">
      <button class="chip activo" data-categoria="Todos">Todos</button>
      <button class="chip" data-categoria="Educación">Educación</button>
      <button class="chip" data-categoria="Tecnología">Tecnología</button>
      <button class="chip" data-categoria="Turismo">Turismo</button>
      <button class="chip" data-categoria="Comercio">Comercio</button>
    </div>

  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <section class="seccion">

      <!-- JavaScript inserta las tarjetas -->
      <div class="grid-servicios" id="contenedor-servicios"></div>

      <!-- Mensaje si no hay resultados -->
      <div class="estado-vacio" id="sin-resultados" style="display:none;">
        <p> No se encontraron servicios con ese criterio.</p>
        <button class="btn btn--contorno" onclick="limpiarFiltros()">Ver todos</button>
      </div>

      <!-- Paginación JavaScript lo genera dinámicamente -->
      <div class="paginacion" id="paginacion"></div>

    </section>
  </main>

  <!-- FOOTER  -->
  <footer>
    <p>&copy; 2024 DigitalServ &nbsp;|&nbsp; Todos los derechos reservados</p>
  </footer>

  <script src="js/datos.js"></script>
  <script src="js/servicios.js"></script>

</body>
</html>
